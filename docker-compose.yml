services:

  # --- BANCO DE DADOS (DATA WAREHOUSE) ---
  postgres_dw:
    image: postgres:15
    container_name: postgres_dw
    environment:
      POSTGRES_USER: ${DW_USER:-admin}
      POSTGRES_PASSWORD: ${DW_PASSWORD:-admin123}
      POSTGRES_DB: ${DW_DATABASE:-dw_glpi}
    ports:
      - "${DW_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DW_USER:-admin} -d ${DW_DATABASE:-dw_glpi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- DASHBOARD (STREAMLIT) ---
  dashboard:
    build: .
    container_name: glpi_dashboard
    env_file: .env
    environment:
      DW_HOST: postgres_dw
    ports:
      - "8501:8501"
    depends_on:
      postgres_dw:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
